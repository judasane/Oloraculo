name: Update README snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  update-readme-snapshots:
    runs-on: ubuntu-latest
    env:
      Oloraculo__ApiFootballApiKey: ${{ secrets.API_FOOTBALL_API_KEY }}
      Oloraculo__ApiFootballLeagueId: ${{ vars.API_FOOTBALL_LEAGUE_ID || '1' }}
      Oloraculo__ApiFootballSeason: ${{ vars.API_FOOTBALL_SEASON || '2026' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore Oloraculo.sln

      - name: Verify live results feed configuration
        run: |
          if [ -z "$Oloraculo__ApiFootballApiKey" ]; then
            echo "::warning::API_FOOTBALL_API_KEY is not configured. README snapshots will use versioned fallback data instead of live results."
          else
            echo "API-Football key configured; README snapshots will refresh from live tournament results."
          fi

      - name: Run tests
        run: dotnet test Oloraculo.sln --no-restore --nologo

      - name: Export README snapshots
        run: dotnet run --project Oloraculo.Web -- --export-readme-snapshots

      - name: Commit updated snapshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update README snapshots
          file_pattern: README.md Oloraculo.Web/Data/*.csv
