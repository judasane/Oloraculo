name: Update README snapshots

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-readme-snapshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore Oloraculo.sln

      - name: Run tests
        run: dotnet test Oloraculo.sln --no-restore --nologo

      - name: Export README snapshots
        run: dotnet run --project Oloraculo.Web -- --export-readme-snapshots

      - name: Commit updated snapshots
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update README snapshots
          file_pattern: README.md Oloraculo.Web/Data/*.csv
